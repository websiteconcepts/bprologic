<!DOCTYPE HTML>
<html>
	<head>
		<title>Contact Us - AskAIVault</title>
		
	</head>
	<body class="is-preload">
		<!-- Wrapper -->
			<div id="wrapper">
				<div id="header_content"></div>
				<!-- Main -->
					<div id="main">
						<div class="inner">
							<header>
								<h1>Contact Us</h1>
								<p>Have a question or want to discuss a project? Fill out the form below and we'll get back to you shortly.</p>
							</header>
							<form method="post" action="https://formsubmit.co/ac85649e77fc0c99c882ff7d7ef01cf2">
								<div class="fields">
									<div class="field half">
										<select name="enquiry" id="enquiry">
											<option value="" disabled selected>Area of Enquiry</option>
											<option value="AI Automation &amp; Development">AI Automation &amp; Development</option>
											<option value="Application Development">Application Development</option>
											<option value="Website Development">Website Development</option>
											<option value="SEO &amp; AI Search Optimization">SEO &amp; AI Search Optimization</option>
											<option value="Server Administration">Server Administration</option>
											<option value="Security">Security</option>
											<option value="Data &amp; Analytics">Data &amp; Analytics</option>
											<option value="General Enquiry">General Enquiry</option>
										</select>
									</div>
									<div class="field half">
										<input type="text" name="name" id="name" placeholder="Name" />
									</div>
									<div class="field half">
										<input type="email" name="email" id="email" placeholder="Email" />
									</div>
									<div class="field half">
										<input type="tel" name="phone" id="phone" placeholder="Phone Number" />
									</div>
									<div class="field">
										<textarea name="message" id="message" placeholder="Message"></textarea>
									</div>
								</div>
								<ul class="actions">
									<li><input type="submit" value="Send" class="primary" /></li>
								</ul>
							</form>

							<h2>Other Ways to Reach Us</h2>
							<p>Email: <a href="mailto:contact@askaivault.com">contact@askaivault.com</a></p>
							<p>Phone: <a href="tel:+918208943984">+91 8208943984</a></p>
						</div>
					</div>

				<!-- Footer -->
					<div id="footer_content"></div>

			</div>

		<!-- Scripts -->
			<div id="footer_scripts"></div>

	</body>
</html>
